<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Relay Dashboard v1.0.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .panel { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .npub-selected {
            background-color: rgb(109 40 217);
            color: white;
            box-shadow: 0 0 0 2px rgb(167 139 250 / 0.7);
        }
        .status-green { color: #10b981; }
        .status-red { color: #f87171; }

        #relays-list::-webkit-scrollbar,
        #npubs-list::-webkit-scrollbar,
        #notes-list::-webkit-scrollbar {
            width: 6px;
        }

        #relays-list::-webkit-scrollbar-thumb,
        #npubs-list::-webkit-scrollbar-thumb,
        #notes-list::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-8">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-bolt text-purple-400 text-3xl"></i>
                <h1 class="text-3xl font-semibold">Nostr Relay Dashboard <span class="text-purple-400 text-xl font-medium">v1.0.3</span></h1>
            </div>
            <div class="flex items-center gap-x-2 text-sm text-zinc-400">
                <i class="fa-solid fa-circle-check text-emerald-400"></i>
                <span id="status" class="font-medium status-green">Ready • incremental sync • full NDJSON backup • safer rendering</span>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="panel bg-zinc-900 rounded-3xl p-6 border border-zinc-800 flex flex-col min-h-[640px]">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-x-2">
                    <i class="fa-solid fa-plug"></i> Upstream Relays
                </h2>
                <div id="relays-list" class="flex-1 space-y-3 overflow-y-auto pr-2"></div>
                <div class="mt-6 pt-6 border-t border-zinc-800">
                    <input id="new-relay-url" type="text" placeholder="wss://..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <input id="new-relay-name" type="text" placeholder="Relay name (optional)" class="mt-2 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <button onclick="addRelay()" class="mt-3 w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-2xl font-medium">+ Add Relay</button>
                </div>
            </div>

            <div class="panel bg-zinc-900 rounded-3xl p-6 border border-zinc-800 flex flex-col min-h-[640px]">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-x-2">
                    <i class="fa-solid fa-user-secret"></i> Monitored Npubs
                </h2>
                <div id="npubs-list" class="flex-1 space-y-3 overflow-y-auto pr-2"></div>
                <div class="mt-6 pt-6 border-t border-zinc-800">
                    <input id="new-npub" type="text" placeholder="npub1..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400 font-mono">
                    <input id="new-label" type="text" placeholder="Nickname (optional)" class="mt-2 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <button onclick="addNpub()" class="mt-3 w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-2xl font-medium">+ Add Npub</button>
                </div>
            </div>

            <div class="panel bg-zinc-900 rounded-3xl p-6 border border-zinc-800 flex flex-col min-h-[640px]">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-x-2">
                    <i class="fa-solid fa-note-sticky"></i>
                    Recent Notes
                    <span id="selected-npub-name" class="text-purple-400 text-sm font-normal ml-auto"></span>
                </h2>
                <div id="notes-list" class="flex-1 space-y-4 overflow-y-auto pr-2 max-h-[560px]"></div>
                <div id="no-events-msg" class="flex-1 flex items-center justify-center text-zinc-400 text-sm">
                    Select an npub to view its stored notes
                </div>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
            <button onclick="syncNow()" class="bg-emerald-500 hover:bg-emerald-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-rotate"></i> Sync Now
            </button>
            <button onclick="backup()" class="bg-violet-500 hover:bg-violet-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-download"></i> Backup
            </button>
            <button onclick="restore()" class="bg-amber-500 hover:bg-amber-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-upload"></i> Restore
            </button>
            <button onclick="downloadLogs()" class="bg-sky-500 hover:bg-sky-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-file-lines"></i> Download Logs
            </button>
            <button onclick="restartServer()" class="bg-red-500 hover:bg-red-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-power-off"></i> Restart
            </button>
        </div>

        <div id="status-bar" class="mt-6 text-center font-medium text-sm"></div>
        <input type="file" id="restore-file" accept=".ndjson" class="hidden" onchange="handleRestoreFile(event)">
    </div>

    <script>
        let selectedNpubId = null;
        let npubsCache = [];
        let relaysCache = [];

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function truncate(value, max) {
            const stringValue = String(value ?? '');
            return stringValue.length > max ? stringValue.slice(0, max - 3) + '...' : stringValue;
        }

        function showStatus(message, isError = false) {
            const bar = document.getElementById('status-bar');
            bar.textContent = message;
            bar.className = `mt-6 text-center font-medium text-sm ${isError ? 'status-red' : 'status-green'}`;
            setTimeout(() => {
                if (bar.textContent === message) {
                    bar.textContent = '';
                }
            }, 5000);
        }

        async function fetchRelays() {
            const response = await fetch('/api/relays');
            relaysCache = await response.json();

            const container = document.getElementById('relays-list');
            container.innerHTML = relaysCache.map(renderRelayCard).join('');
        }

        function renderRelayCard(relay) {
            const errorBlock = relay.last_error
                ? `<div class="text-red-400 text-[11px] leading-snug break-words">Last error: ${escapeHtml(truncate(relay.last_error, 160))}</div>`
                : `<div class="text-zinc-400 text-[11px]">${relay.last_sync_notes} new notes stored on last run</div>`;

            return `
                <div class="bg-zinc-800 rounded-2xl px-4 py-3 text-xs ${relay.enabled ? '' : 'opacity-60'}">
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <div class="font-medium flex items-center gap-2">
                                <span>${escapeHtml(relay.name || 'Unnamed relay')}</span>
                                ${relay.preloaded ? '<span class="text-[10px] px-2 py-0.5 rounded-full bg-zinc-700 text-zinc-300">preloaded</span>' : ''}
                            </div>
                            <div class="text-zinc-400 truncate max-w-[220px]">${escapeHtml(relay.url)}</div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <button onclick="toggleRelay(${relay.id}, ${!relay.enabled})" class="px-3 py-1 rounded-full text-[11px] font-semibold ${relay.enabled ? 'bg-emerald-500 text-white' : 'bg-zinc-700 text-zinc-200'}">
                                ${relay.enabled ? 'On' : 'Off'}
                            </button>
                            <button onclick="deleteRelay(${relay.id})" class="w-8 h-8 rounded-full bg-zinc-700 hover:bg-red-500 text-zinc-200 hover:text-white">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mt-3 flex items-end justify-between gap-3">
                        ${errorBlock}
                        <div class="text-zinc-400 text-[10px] shrink-0">${escapeHtml(relay.last_synced || 'never')}</div>
                    </div>
                </div>
            `;
        }

        async function fetchNpubs() {
            const response = await fetch('/api/npubs');
            npubsCache = await response.json();

            const container = document.getElementById('npubs-list');
            container.innerHTML = npubsCache.map(renderNpubCard).join('');
        }

        function renderNpubCard(npub) {
            const displayNpub = truncate(npub.npub, 28);
            const isSelected = npub.id === selectedNpubId ? 'npub-selected' : '';

            return `
                <div onclick="selectNpub(${npub.id})" class="bg-zinc-800 rounded-2xl px-4 py-3 text-xs cursor-pointer ${isSelected}">
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <div class="font-medium">${escapeHtml(npub.label || 'No label')}</div>
                            <div class="text-zinc-400 font-mono">${escapeHtml(displayNpub)}</div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteNpub(${npub.id})" class="w-8 h-8 rounded-full bg-zinc-700 hover:bg-red-500 text-zinc-200 hover:text-white shrink-0">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    <div class="mt-3 flex items-end justify-between">
                        <div class="text-emerald-400">${npub.notes_stored} stored notes</div>
                        <div class="text-zinc-400 text-[10px]">${escapeHtml(npub.last_synced || 'never')}</div>
                    </div>
                </div>
            `;
        }

        async function selectNpub(id) {
            selectedNpubId = id;
            const npub = npubsCache.find(item => item.id === id);

            document.getElementById('selected-npub-name').textContent =
                npub?.label || truncate(npub?.npub || '', 16);

            await fetchEvents(id);
            await fetchNpubs();
        }

        async function fetchEvents(npubId) {
            const response = await fetch(`/api/npubs/${npubId}/events`);
            const events = await response.json();

            const container = document.getElementById('notes-list');
            const noMsg = document.getElementById('no-events-msg');

            if (!events.length) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
                return;
            }

            noMsg.classList.add('hidden');
            container.innerHTML = events.map(event => `
                <div class="bg-zinc-800 rounded-2xl p-4 text-sm">
                    <div class="flex items-center justify-between gap-3 mb-2">
                        <div class="text-emerald-400 text-xs">${escapeHtml(event.created_at)}</div>
                        <div class="text-zinc-500 text-[11px]">${escapeHtml(event.kind_name)}</div>
                    </div>
                    <div class="leading-relaxed whitespace-pre-wrap break-words">${escapeHtml(event.preview)}</div>
                </div>
            `).join('');
        }

        async function addRelay() {
            const url = document.getElementById('new-relay-url').value.trim();
            const name = document.getElementById('new-relay-name').value.trim();

            if (!url) {
                showStatus('Enter a relay URL first', true);
                return;
            }

            const response = await fetch('/api/relays', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, name: name || null })
            });

            const data = await response.json();
            showStatus(data.message, !data.success);

            if (data.success) {
                document.getElementById('new-relay-url').value = '';
                document.getElementById('new-relay-name').value = '';
                await fetchRelays();
            }
        }

        async function addNpub() {
            const npub = document.getElementById('new-npub').value.trim();
            const label = document.getElementById('new-label').value.trim();

            if (!npub) {
                showStatus('Enter an npub first', true);
                return;
            }

            const response = await fetch('/api/npubs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ npub, label: label || null })
            });

            const data = await response.json();
            showStatus(data.message, !data.success);

            if (data.success) {
                document.getElementById('new-npub').value = '';
                document.getElementById('new-label').value = '';
                await fetchNpubs();
            }
        }

        async function toggleRelay(id, enabled) {
            const response = await fetch(`/api/relays/${id}/toggle`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            });

            const data = await response.json();
            showStatus(data.message, !data.success);

            if (data.success) {
                await fetchRelays();
            }
        }

        async function deleteRelay(id) {
            if (!confirm('Delete this relay? Stored notes will remain.')) {
                return;
            }

            const response = await fetch(`/api/relays/${id}`, { method: 'DELETE' });
            const data = await response.json();
            showStatus(data.message, !data.success);

            if (data.success) {
                await fetchRelays();
            }
        }

        async function deleteNpub(id) {
            if (!confirm('Delete this monitored npub? Stored notes will remain in the archive.')) {
                return;
            }

            const response = await fetch(`/api/npubs/${id}`, { method: 'DELETE' });
            const data = await response.json();
            showStatus(data.message, !data.success);

            if (data.success) {
                if (selectedNpubId === id) {
                    selectedNpubId = null;
                    document.getElementById('selected-npub-name').textContent = '';
                    document.getElementById('notes-list').innerHTML = '';
                    document.getElementById('no-events-msg').classList.remove('hidden');
                }
                await fetchNpubs();
            }
        }

        async function syncNow() {
            const response = await fetch('/api/sync', { method: 'POST' });
            const data = await response.json();
            showStatus(data.message, !data.success);

            setTimeout(fetchRelays, 2000);
            setTimeout(fetchNpubs, 2000);
            if (selectedNpubId) {
                setTimeout(() => fetchEvents(selectedNpubId), 3000);
            }
        }

        async function backup() {
            const response = await fetch('/api/backup');
            if (!response.ok) {
                showStatus('Backup failed', true);
                return;
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = 'nostr-dashboard-backup.ndjson';
            anchor.click();
            URL.revokeObjectURL(url);
            showStatus('Backup downloaded successfully');
        }

        function restore() {
            document.getElementById('restore-file').click();
        }

        async function handleRestoreFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const text = await file.text();
            const response = await fetch('/api/restore', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ndjson: text })
            });

            const data = await response.json();
            showStatus(data.message, !data.success);

            if (data.success) {
                await fetchRelays();
                await fetchNpubs();
                if (selectedNpubId) {
                    await fetchEvents(selectedNpubId);
                }
            }

            event.target.value = '';
        }

        async function downloadLogs() {
            const response = await fetch('/api/logs');
            if (!response.ok) {
                showStatus('Could not download logs', true);
                return;
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = 'dashboard.log';
            anchor.click();
            URL.revokeObjectURL(url);
            showStatus('Logs downloaded');
        }

        async function restartServer() {
            const response = await fetch('/api/restart', { method: 'POST' });
            const data = await response.json();
            showStatus(data.message, !data.success);
        }

        window.onload = async () => {
            await fetchRelays();
            await fetchNpubs();
            console.log('%c✅ NRD v1.0.3 release bundle loaded — incremental sync + full backup + safer rendering', 'color:#10b981;font-weight:bold;');
        };
    </script>
</body>
</html>
