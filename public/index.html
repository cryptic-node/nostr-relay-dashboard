<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nostr Relay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #111111; font-family: system-ui; }
        .card { background: #1f1f1f; }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">My Nostr Relay</h1>
                <p class="text-zinc-400">Personal backup & aggregator • Powered by Rust</p>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="text-green-400 font-medium">Ready</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Upstream Relays -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Upstream Relays</h2>
                    <span class="bg-zinc-800 text-xs px-3 py-1 rounded-full" id="relay-count">0 relays</span>
                </div>
                <div id="relays-list" class="space-y-3"></div>
                <div class="mt-6 flex flex-wrap gap-2">
                    <input id="relay-url" placeholder="wss://..." class="flex-1 min-w-[200px] bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="relay-name" placeholder="Name (optional)" class="flex-1 min-w-[140px] bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none">
                    <button onclick="addRelay()" class="bg-blue-500 hover:bg-blue-600 px-8 rounded-xl font-medium">Add</button>
                </div>
            </div>

            <!-- Monitored Npubs -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Monitored Npubs</h2>
                    <span class="bg-zinc-800 text-xs px-3 py-1 rounded-full" id="npub-count">0 npubs</span>
                </div>
                <div id="npubs-list" class="space-y-3"></div>
                <div class="mt-6 flex flex-wrap gap-2">
                    <input id="npub-input" placeholder="npub1..." class="flex-1 min-w-[200px] bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <input id="label-input" placeholder="Label (optional)" class="flex-1 min-w-[140px] bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none">
                    <button onclick="addNpub()" class="bg-green-500 hover:bg-green-600 px-8 rounded-xl font-medium">Add</button>
                </div>
            </div>

            <!-- Recent Events -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Recent Events</h2>
                    <span id="selected-npub" class="text-zinc-400 text-sm font-mono"></span>
                </div>
                <div id="events-list" class="space-y-3 min-h-[400px]"></div>
                <p id="no-events" class="text-zinc-500 text-center py-12 hidden">Click any npub to see its 10 most recent events</p>
            </div>
        </div>

        <div class="mt-8 flex justify-center">
            <button onclick="triggerSync()" class="bg-purple-600 hover:bg-purple-700 text-white text-xl font-semibold px-12 py-5 rounded-3xl flex items-center gap-3">
                <i class="fas fa-sync"></i> Sync Now — Pull Events from Upstream
            </button>
        </div>
        <div id="status" class="mt-6 text-center text-green-400 font-medium min-h-[28px]"></div>
    </div>

    <script>
        let selectedNpub = null;

        async function loadData() {
            const [rRes, nRes] = await Promise.all([fetch('/api/relays'), fetch('/api/npubs')]);
            const relays = await rRes.json();
            const npubs = await nRes.json();

            document.getElementById('relays-list').innerHTML = relays.map(r => {
                const notes = r.last_sync_notes || 0;
                const time = r.last_synced 
                    ? new Date(r.last_synced).toLocaleString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) 
                    : 'never';
                return `
                <div class="bg-zinc-900 rounded-xl p-4 flex justify-between items-center group">
                    <div class="flex-1">
                        <div class="font-mono text-sm text-blue-400">${r.url}</div>
                        <div class="text-zinc-400 text-xs">${r.name || ''}</div>
                        <div class="text-[10px] text-zinc-500 mt-1">
                            ${notes} notes pulled • last sync ${time}
                        </div>
                    </div>
                    <button onclick="deleteRelay(${r.id}); event.stopImmediatePropagation();" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>`;
            }).join('');

            document.getElementById('npubs-list').innerHTML = npubs.map(n => `
                <div onclick="selectNpub('${n.npub}', '${n.label || ''}')" class="bg-zinc-900 hover:bg-zinc-800 cursor-pointer rounded-xl p-4 transition-all flex justify-between items-center ${selectedNpub === n.npub ? 'ring-2 ring-purple-500' : ''}">
                    <div>
                        <div class="font-mono text-sm break-all">${n.npub}</div>
                        ${n.label ? `<div class="text-green-400 text-xs">${n.label}</div>` : ''}
                    </div>
                    <button onclick="deleteNpub(${n.id}); event.stopImmediatePropagation();" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>`).join('');

            document.getElementById('relay-count').textContent = `${relays.length} relays`;
            document.getElementById('npub-count').textContent = `${npubs.length} npubs`;
        }

        window.selectNpub = async function(npub, label) {
            selectedNpub = npub;
            document.getElementById('selected-npub').textContent = label || npub.substring(0, 12) + '...';

            const res = await fetch(`/api/events?npub=${npub}`);
            const events = await res.json();
            const container = document.getElementById('events-list');
            const noEvents = document.getElementById('no-events');

            noEvents.classList.toggle('hidden', events.length > 0);
            container.innerHTML = events.map(e => `
                <div class="bg-zinc-900 rounded-xl p-4 text-sm">
                    <div class="flex justify-between text-xs mb-2">
                        <span class="bg-zinc-700 px-2 py-1 rounded">${e.kind_name}</span>
                        <span class="text-zinc-400">${e.created_at}</span>
                    </div>
                    <div class="text-zinc-300 whitespace-pre-wrap">${e.content}</div>
                </div>`).join('');
        };

        window.addRelay = async function() {
            const url = document.getElementById('relay-url').value.trim();
            const name = document.getElementById('relay-name').value.trim() || null;
            if (!url) return;
            const res = await fetch('/api/relays', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, name })
            });
            const data = await res.json();
            document.getElementById('status').innerHTML = data.message;
            if (data.success) {
                loadData();
                document.getElementById('relay-url').value = '';
                document.getElementById('relay-name').value = '';
            }
        };

        window.addNpub = async function() {
            const npub = document.getElementById('npub-input').value.trim();
            const label = document.getElementById('label-input').value.trim() || null;
            if (!npub) return;
            const res = await fetch('/api/npubs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ npub, label })
            });
            const data = await res.json();
            document.getElementById('status').innerHTML = data.message;
            if (data.success) {
                loadData();
                document.getElementById('npub-input').value = '';
                document.getElementById('label-input').value = '';
            }
        };

        window.deleteRelay = async function(id) {
            if (!confirm('Delete this relay?')) return;
            const res = await fetch(`/api/relays/${id}`, { method: 'DELETE' });
            const data = await res.json();
            document.getElementById('status').innerHTML = data.message;
            if (data.success) loadData();
        };

        window.deleteNpub = async function(id) {
            if (!confirm('Delete this npub?')) return;
            const res = await fetch(`/api/npubs/${id}`, { method: 'DELETE' });
            const data = await res.json();
            document.getElementById('status').innerHTML = data.message;
            if (data.success) {
                selectedNpub = null;
                loadData();
                document.getElementById('events-list').innerHTML = '';
                document.getElementById('no-events').classList.remove('hidden');
            }
        };

        window.triggerSync = async function() {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Syncing...`;
            const res = await fetch('/api/sync', { method: 'POST' });
            const data = await res.json();
            statusEl.innerHTML = `<span class="text-green-400">${data.message}</span>`;
            if (data.success) {
                loadData();
                if (selectedNpub) selectNpub(selectedNpub, document.getElementById('selected-npub').textContent);
            }
        };

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
