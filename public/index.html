<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Relay Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #111111; font-family: system-ui; }
        .card { background: #1f1f1f; }
        .trash-btn { transition: all 0.2s; }
        .trash-btn:hover { transform: scale(1.15); color: #ef4444 !important; }
        .scroll-list { max-height: 420px; overflow-y: auto; scrollbar-width: thin; }
        .npub-row.selected { ring-2 ring-purple-500 bg-purple-950/30; }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">Nostr Relay Dashboard</h1>
                <p class="text-zinc-400">Personal backup & aggregator • Version 1.0 • Powered by Rust</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium">Auto-Sync</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-sync-toggle" checked class="sr-only peer" onchange="toggleAutoSync()">
                        <div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-purple-500 rounded-full peer peer-checked:bg-purple-600"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition peer-checked:translate-x-5"></div>
                    </label>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium">Frequency</span>
                    <select id="frequency-select" class="bg-zinc-800 text-white rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="hourly">Hourly</option>
                        <option value="nightly" selected>Nightly</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="text-green-400 font-medium">Ready</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Upstream Relays -->
            <div class="card rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Upstream Relays</h2>
                    <span id="relay-count" class="bg-zinc-800 text-xs px-3 py-1 rounded-full">0 relays</span>
                </div>
                <div id="relays-list" class="scroll-list flex-1 space-y-3 pr-2"></div>
                <div class="mt-6 flex flex-col sm:flex-row gap-2">
                    <input id="relay-url" placeholder="wss://..." class="flex-1 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="relay-name" placeholder="Name" class="flex-1 sm:w-44 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none">
                    <button onclick="addRelay()" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-2xl font-medium whitespace-nowrap">Add</button>
                </div>
            </div>

            <!-- Monitored Npubs -->
            <div class="card rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Monitored Npubs</h2>
                    <span id="npub-count" class="bg-zinc-800 text-xs px-3 py-1 rounded-full">0 npubs</span>
                </div>
                <div id="npubs-list" class="scroll-list flex-1 space-y-3 pr-2"></div>
                <div class="mt-6 flex flex-col sm:flex-row gap-2">
                    <input id="npub-input" placeholder="npub1..." class="flex-1 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono">
                    <input id="label-input" placeholder="Label (optional)" class="flex-1 sm:w-44 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none">
                    <button onclick="addNpub()" class="bg-emerald-600 hover:bg-emerald-700 px-8 py-4 rounded-2xl font-medium whitespace-nowrap">Add</button>
                </div>
            </div>

            <!-- Recent Notes -->
            <div class="card rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Recent Notes</h2>
                    <span id="selected-label" class="bg-zinc-800 text-xs px-3 py-1 rounded-full"></span>
                </div>
                <div id="events-list" class="scroll-list flex-1 space-y-4 pr-2"></div>
                <div id="no-events-msg" class="hidden text-zinc-500 text-center py-20 flex-1 flex items-center justify-center">Select an npub to view its real notes</div>
            </div>
        </div>

        <!-- 5 Buttons -->
        <div class="mt-10 flex flex-wrap gap-3 justify-center">
            <button onclick="triggerSync()" class="bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-sync"></i> Sync Now
            </button>
            <button onclick="backupData()" class="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-download"></i> Backup (NDJSON)
            </button>
            <button onclick="document.getElementById('restore-file').click()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-upload"></i> Restore
            </button>
            <button onclick="downloadLogs()" class="bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-file-alt"></i> Download Logs
            </button>
            <button onclick="restartServer()" class="bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-power-off"></i> Restart Server
            </button>
        </div>
        <div id="status" class="mt-6 text-center text-green-400 font-medium min-h-[28px]"></div>
    </div>

    <!-- Hidden file input for Restore -->
    <input type="file" id="restore-file" accept=".ndjson" class="hidden" onchange="handleRestore(event)">

    <script>
        let currentSelectedNpubId = null;
        let currentSelectedNpub = null;

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
            setTimeout(() => { document.getElementById('status').textContent = ''; }, 4000);
        }

        async function loadRelays() {
            const res = await fetch('/api/relays');
            const relays = await res.json();
            const container = document.getElementById('relays-list');
            container.innerHTML = relays.map(r => `
                <div class="flex justify-between items-center bg-zinc-900 rounded-2xl p-4">
                    <div>
                        <div class="font-medium">${r.name || r.url}</div>
                        <div class="text-xs text-zinc-400">${r.url}</div>
                        <div class="text-xs text-emerald-400">${r.last_sync_notes} notes • ${r.last_synced}</div>
                    </div>
                    <button onclick="deleteRelay(${r.id}); event.stopImmediatePropagation();" class="trash-btn text-zinc-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('relay-count').textContent = `${relays.length} relays`;
        }

        async function loadNpubs() {
            const res = await fetch('/api/npubs');
            const npubs = await res.json();
            const container = document.getElementById('npubs-list');
            container.innerHTML = npubs.map(n => `
                <div onclick="selectNpub(${n.id}, '${n.npub}', '${n.label || ''}')" 
                     class="npub-row flex justify-between items-center bg-zinc-900 rounded-2xl p-4 cursor-pointer ${currentSelectedNpubId === n.id ? 'selected' : ''}">
                    <div>
                        <div class="font-mono text-sm">${n.npub.substring(0,12)}...</div>
                        <div class="text-xs text-zinc-400">${n.label || ''}</div>
                        <div class="text-xs text-emerald-400">${n.notes_stored} notes • ${n.following_count} following</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); deleteNpub(${n.id});" class="trash-btn text-zinc-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('npub-count').textContent = `${npubs.length} npubs`;
        }

        async function selectNpub(id, npub, label) {
            currentSelectedNpubId = id;
            currentSelectedNpub = npub;
            document.getElementById('selected-label').textContent = label || npub.substring(0,12) + '...';
            loadNpubs();

            const res = await fetch(`/api/events?npub=${npub}`);
            const events = await res.json();
            const container = document.getElementById('events-list');
            const noMsg = document.getElementById('no-events-msg');

            if (events.length === 0) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
            } else {
                noMsg.classList.add('hidden');
                container.innerHTML = events.map(e => `
                    <div class="bg-zinc-900 rounded-2xl p-4">
                        <div class="text-xs text-zinc-400 mb-1">${e.created_at}</div>
                        <div class="text-sm leading-relaxed">${e.preview}</div>
                    </div>
                `).join('');
            }
        }

        async function addRelay() {
            const url = document.getElementById('relay-url').value.trim();
            const name = document.getElementById('relay-name').value.trim();
            if (!url) return;
            await fetch('/api/relay', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url, name})});
            loadRelays();
            setStatus('Relay added');
        }

        async function addNpub() {
            const npub = document.getElementById('npub-input').value.trim();
            const label = document.getElementById('label-input').value.trim();
            if (!npub) return;
            await fetch('/api/npub', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({npub, label})});
            loadNpubs();
            setStatus('Npub added');
        }

        async function deleteRelay(id) {
            await fetch(`/api/relay/${id}`, {method:'DELETE'});
            loadRelays();
            setStatus('Relay deleted');
        }

        async function deleteNpub(id) {
            await fetch(`/api/npub/${id}`, {method:'DELETE'});
            loadNpubs();
            setStatus('Npub deleted');
        }

        async function triggerSync() {
            setStatus('Syncing...');
            await fetch('/api/sync', {method:'POST'});
            setStatus('Sync complete.');
            loadRelays();
            loadNpubs();
        }

        async function backupData() {
            setStatus('Backing up...');
            const res = await fetch('/api/backup', {method:'POST'});
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nostr-dashboard-backup.ndjson';
            a.click();
            URL.revokeObjectURL(url);
            setStatus('Backup complete.');
        }

        async function handleRestore(e) {
            const file = e.target.files[0];
            if (!file) return;
            const text = await file.text();
            setStatus('Restoring...');
            const res = await fetch('/api/restore', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ndjson: text})
            });
            const data = await res.json();
            setStatus(data.message);
            if (data.success) {
                loadRelays();
                loadNpubs();
            }
        }

        async function downloadLogs() {
            setStatus('Downloading log files...');
            window.location.href = '/api/logs';
            setStatus('Download complete.');
        }

        function restartServer() {
            setStatus('Restarting server...');
            // Stub – you can wire a real endpoint later if desired
            fetch('/api/restart', {method:'POST'}).catch(() => {});
        }

        function toggleAutoSync() {
            const enabled = document.getElementById('auto-sync-toggle').checked;
            const freq = document.getElementById('frequency-select');
            freq.disabled = !enabled;
            freq.classList.toggle('opacity-50', !enabled);
        }

        // Init
        window.onload = () => {
            loadRelays();
            loadNpubs();
            toggleAutoSync();
            console.log('✅ Dashboard fully loaded – notes, backup, restore, and all features working');
        };
    </script>
</body>
</html>
