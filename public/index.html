<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Relay Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #111111; font-family: system-ui; }
        .card { background: #1f1f1f; }
        .trash-btn { transition: all 0.2s; }
        .trash-btn:hover { transform: scale(1.15); color: #ef4444 !important; }
        .scroll-list { max-height: 420px; overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">Nostr Relay Dashboard</h1>
                <p class="text-zinc-400">Personal backup & aggregator • Version 1.0 • Powered by Rust</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium">Auto-Sync</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-sync-toggle" checked class="sr-only peer" onchange="toggleAutoSync()">
                        <div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-purple-500 rounded-full peer peer-checked:bg-purple-600"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition peer-checked:translate-x-5"></div>
                    </label>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium">Frequency</span>
                    <select id="frequency-select" class="bg-zinc-800 text-white rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="hourly">Hourly</option>
                        <option value="nightly" selected>Nightly</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="text-green-400 font-medium">Ready</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Upstream Relays -->
            <div class="card rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Upstream Relays</h2>
                    <span id="relay-count" class="bg-zinc-800 text-xs px-3 py-1 rounded-full">0 relays</span>
                </div>
                <div id="relays-list" class="scroll-list flex-1 space-y-3 pr-2"></div>
                <div class="mt-6 flex gap-2">
                    <input id="relay-url" placeholder="wss://..." class="flex-1 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="relay-name" placeholder="Name" class="w-44 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none">
                    <button onclick="addRelay()" class="bg-blue-600 hover:bg-blue-700 px-7 rounded-2xl font-medium">Add</button>
                </div>
            </div>

            <!-- Monitored Npubs -->
            <div class="card rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Monitored Npubs</h2>
                    <span id="npub-count" class="bg-zinc-800 text-xs px-3 py-1 rounded-full">0 npubs</span>
                </div>
                <div id="npubs-list" class="scroll-list flex-1 space-y-3 pr-2"></div>
                <div class="mt-6 flex gap-2">
                    <input id="npub-input" placeholder="npub1..." class="flex-1 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono">
                    <input id="label-input" placeholder="Label (optional)" class="w-44 bg-zinc-900 rounded-2xl px-5 py-4 focus:outline-none">
                    <button onclick="addNpub()" class="bg-emerald-600 hover:bg-emerald-700 px-7 rounded-2xl font-medium">Add</button>
                </div>
            </div>

            <!-- Recent Events -->
            <div class="card rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Recent Events</h2>
                    <span id="selected-label" class="bg-zinc-800 text-xs px-3 py-1 rounded-full"></span>
                </div>
                <div id="events-list" class="scroll-list flex-1 space-y-4 pr-2"></div>
                <div id="no-events-msg" class="hidden text-zinc-500 text-center py-20 flex-1 flex items-center justify-center">Select an npub to view its real notes</div>
            </div>
        </div>

        <!-- Action Buttons + Status -->
        <div class="mt-10 flex flex-wrap gap-3 justify-center">
            <button onclick="triggerSync()" id="sync-btn" class="bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-sync"></i> Sync Now
            </button>
            <button onclick="backupData()" class="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-download"></i> Backup (NDJSON)
            </button>
            <button onclick="restoreData()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-upload"></i> Restore
            </button>
            <button onclick="downloadLogs()" class="bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-file-alt"></i> Download Logs
            </button>
            <button onclick="restartServer()" class="bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 text-white font-semibold px-8 py-4 rounded-3xl flex items-center gap-3 shadow-lg">
                <i class="fas fa-power-off"></i> Restart Server
            </button>
        </div>
        <div id="status" class="mt-6 text-center text-green-400 font-medium min-h-[28px]"></div>
    </div>

    <script>
        let currentSelectedNpub = null;

        async function loadData() {
            try {
                const [relaysRes, npubsRes] = await Promise.all([fetch('/api/relays'), fetch('/api/npubs')]);
                const relays = await relaysRes.json();
                const npubs = await npubsRes.json();

                // Relays with notes pulled + last sync (restores previous detailed display)
                document.getElementById('relays-list').innerHTML = relays.map(r => `
                    <div class="flex justify-between items-center bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl group">
                        <div>
                            <div class="font-mono text-sm text-blue-300">${r.url}</div>
                            ${r.name ? `<div class="text-xs text-zinc-400">${r.name}</div>` : ''}
                            ${r.notes_pulled !== undefined ? `<div class="text-xs text-emerald-400">${r.notes_pulled} notes pulled • last sync ${r.last_sync || 'never'}</div>` : ''}
                        </div>
                        <button onclick="deleteRelay(${r.id}); event.stopImmediatePropagation()" class="trash-btn text-red-400">
                            <i class="fas fa-trash-can"></i>
                        </button>
                    </div>
                `).join('');

                // Npubs with real note count
                document.getElementById('npubs-list').innerHTML = npubs.map(n => {
                    const isSelected = currentSelectedNpub === n.npub ? 'ring-2 ring-purple-500 bg-zinc-800' : '';
                    return `
                    <div onclick="selectNpub('${n.npub}', '${n.label || ''}')" class="cursor-pointer bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl transition-all ${isSelected}">
                        <div class="font-mono text-sm break-all">${n.npub}</div>
                        ${n.label ? `<div class="text-emerald-400 text-xs mt-1">${n.label}</div>` : ''}
                        <div class="text-zinc-400 text-xs mt-1">${n.note_count || 0} notes synced</div>
                    </div>`;
                }).join('');

                document.getElementById('relay-count').textContent = `${relays.length} relays`;
                document.getElementById('npub-count').textContent = `${npubs.length} npubs`;
            } catch (e) { console.error("Load error:", e); }
        }

        async function selectNpub(npub, label) {
            currentSelectedNpub = npub;
            document.getElementById('selected-label').innerHTML = `<span class="bg-zinc-800 text-xs px-3 py-1 rounded-full">${label || npub.slice(0,12)+'...'}</span>`;

            const res = await fetch(`/api/events?npub=${encodeURIComponent(npub)}`);
            let events = await res.json();

            // ONLY real notes (kind=1) – contacts completely hidden
            events = events.filter(e => e.kind === 1);

            const container = document.getElementById('events-list');
            const noMsg = document.getElementById('no-events-msg');

            if (events.length === 0) {
                container.innerHTML = '';
                noMsg.classList.remove('hidden');
            } else {
                noMsg.classList.add('hidden');
                container.innerHTML = events.map(e => `
                    <div class="bg-zinc-900 rounded-2xl p-5">
                        <div class="flex justify-between text-xs mb-3">
                            <span class="px-3 py-1 rounded-full bg-purple-900 text-purple-300">Note</span>
                            <span class="text-zinc-500">${e.created_at}</span>
                        </div>
                        <div class="text-zinc-200 whitespace-pre-wrap">${e.preview || '(no content)'}</div>
                    </div>
                `).join('');
            }
            loadData();
        }

        async function addRelay() {
            const url = document.getElementById('relay-url').value.trim();
            const name = document.getElementById('relay-name').value.trim();
            if (!url) return alert("URL required");
            await fetch('/api/relays', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url, name: name || null}) });
            document.getElementById('relay-url').value = '';
            document.getElementById('relay-name').value = '';
            loadData();
        }

        async function deleteRelay(id) {
            if (!confirm('Delete this relay?')) return;
            await fetch(`/api/relays/${id}`, { method: 'DELETE' });
            loadData();
        }

        async function addNpub() {
            const npub = document.getElementById('npub-input').value.trim();
            const label = document.getElementById('label-input').value.trim();
            if (!npub) return alert("npub required");
            await fetch('/api/npubs', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({npub, label: label || null}) });
            document.getElementById('npub-input').value = '';
            document.getElementById('label-input').value = '';
            loadData();
        }

        async function triggerSync() {
            const btn = document.getElementById('sync-btn');
            const original = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Syncing...`;
            btn.disabled = true;
            const statusEl = document.getElementById('status');
            statusEl.textContent = '';

            try {
                const res = await fetch('/api/sync', { method: 'POST' });
                const data = await res.json();
                // Show detailed green status under buttons
                statusEl.innerHTML = `<span class="text-emerald-400">${data.message || 'Sync finished!'}</span>`;
                setTimeout(() => { statusEl.textContent = ''; }, 6000);
            } catch (e) {
                statusEl.innerHTML = `<span class="text-red-400">Sync failed</span>`;
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
                loadData();
            }
        }

        async function backupData() {
            const res = await fetch('/api/backup');
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'nostr-backup.ndjson';
            document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        }

        async function restoreData() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.ndjson';
            input.onchange = async e => {
                const file = e.target.files[0];
                if (!file) return;
                const form = new FormData(); form.append('file', file);
                await fetch('/api/restore', { method: 'POST', body: form });
                loadData(); alert('Restore complete');
            };
            input.click();
        }

        async function downloadLogs() { window.location.href = '/api/logs'; }
        async function restartServer() { if (confirm('Restart server?')) await fetch('/api/restart', { method: 'POST' }); alert('Server restarting...'); }
        function toggleAutoSync() { document.getElementById('frequency-select').disabled = !document.getElementById('auto-sync-toggle').checked; }

        window.onload = loadData;
    </script>
</body>
</html>
