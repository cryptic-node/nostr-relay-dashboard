<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nostr Relay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #111111; font-family: system-ui; }
        .card { background: #1f1f1f; }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">My Nostr Relay</h1>
                <p class="text-zinc-400">Personal backup & aggregator • Powered by Rust</p>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="text-green-400 font-medium">Ready</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Upstream Relays -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Upstream Relays</h2>
                    <span class="bg-zinc-800 text-xs px-3 py-1 rounded-full" id="relay-count">5 relays</span>
                </div>
                <div id="relays-list" class="space-y-3"></div>
                <!-- Add new relay -->
                <div class="mt-6 flex gap-2">
                    <input id="relay-url" type="text" placeholder="wss://new-relay.example.com" 
                           class="flex-1 bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="relay-name" type="text" placeholder="Name (optional)" 
                           class="w-48 bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none">
                    <button onclick="addRelay()" class="bg-blue-500 hover:bg-blue-600 px-6 rounded-xl font-medium">Add</button>
                </div>
            </div>

            <!-- Monitored Npubs -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Monitored Npubs</h2>
                    <span class="bg-zinc-800 text-xs px-3 py-1 rounded-full" id="npub-count">1 npubs</span>
                </div>
                <div id="npubs-list" class="space-y-3"></div>
                <div class="mt-6 flex gap-2">
                    <input id="npub-input" type="text" placeholder="npub1..." 
                           class="flex-1 bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <input id="label-input" type="text" placeholder="Label (optional)" 
                           class="w-48 bg-zinc-900 rounded-xl px-4 py-3 focus:outline-none">
                    <button onclick="addNpub()" class="bg-green-500 hover:bg-green-600 px-8 rounded-xl font-medium whitespace-nowrap">Add</button>
                </div>
            </div>

            <!-- Recent Events -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">Recent Events</h2>
                    <span id="selected-npub" class="text-zinc-400 text-sm font-mono"></span>
                </div>
                <div id="events-list" class="space-y-3 min-h-[400px]"></div>
                <p id="no-events" class="text-zinc-500 text-center py-12 hidden">Click any npub on the left to see its 10 most recent events</p>
            </div>
        </div>

        <div class="mt-8 flex justify-center">
            <button onclick="triggerSync()" 
                    class="bg-purple-600 hover:bg-purple-700 text-white text-xl font-semibold px-12 py-5 rounded-3xl flex items-center gap-3 shadow-lg shadow-purple-500/30">
                <i class="fas fa-sync"></i>
                Sync Now — Pull Events from Upstream
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-green-400 font-medium"></div>
    </div>

    <script>
        let selectedNpub = null;

        async function loadData() {
            const [relaysRes, npubsRes] = await Promise.all([fetch('/api/relays'), fetch('/api/npubs')]);
            const relays = await relaysRes.json();
            const npubs = await npubsRes.json();

            // Relays with delete
            document.getElementById('relays-list').innerHTML = relays.map(r => `
                <div class="bg-zinc-900 rounded-xl p-4 flex justify-between items-center group">
                    <div>
                        <div class="font-mono text-sm text-blue-400">${r.url}</div>
                        <div class="text-zinc-400 text-xs">${r.name || ''}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="bg-orange-500 text-[10px] px-2 py-0.5 rounded">PRELOADED</span>
                        <div class="flex items-center gap-1 text-green-400 text-xs"><span class="w-2 h-2 bg-green-400 rounded-full"></span>ENABLED</div>
                        <button onclick="deleteRelay(${r.id}); event.stopImmediatePropagation();" class="text-red-400 hover:text-red-500 opacity-0 group-hover:opacity-100"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // Npubs with delete
            document.getElementById('npubs-list').innerHTML = npubs.map(n => `
                <div onclick="selectNpub('${n.npub}', '${n.label || ''}')" class="bg-zinc-900 hover:bg-zinc-800 cursor-pointer rounded-xl p-4 transition-all flex justify-between items-center ${selectedNpub === n.npub ? 'ring-2 ring-purple-500' : ''}">
                    <div>
                        <div class="font-mono text-sm break-all">${n.npub}</div>
                        ${n.label ? `<div class="text-green-400 text-xs mt-1">${n.label}</div>` : ''}
                        ${n.last_synced ? `<div class="text-xs text-zinc-500 mt-2">Last sync: ${new Date(n.last_synced).toLocaleString()}</div>` : ''}
                    </div>
                    <button onclick="deleteNpub(${n.id}); event.stopImmediatePropagation();" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');

            document.getElementById('relay-count').textContent = `${relays.length} relays`;
            document.getElementById('npub-count').textContent = `${npubs.length} npubs`;
        }

        window.selectNpub = async function(npub, label) {
            selectedNpub = npub;
            document.getElementById('selected-npub').textContent = label || npub.substring(0, 12) + '...';
            await loadRecentEvents();
            loadData();
        };

        async function loadRecentEvents() {
            if (!selectedNpub) return;
            const res = await fetch(`/api/events?npub=${selectedNpub}`);
            const events = await res.json();
            const container = document.getElementById('events-list');
            const noEvents = document.getElementById('no-events');

            if (events.length === 0) {
                container.innerHTML = '';
                noEvents.classList.remove('hidden');
                return;
            }
            noEvents.classList.add('hidden');
            container.innerHTML = events.map(e => `
                <div class="bg-zinc-900 rounded-xl p-4 text-sm">
                    <div class="flex justify-between text-xs mb-2">
                        <span class="bg-zinc-700 px-2 py-1 rounded">${e.kind_name}</span>
                        <span class="text-zinc-400">${new Date(e.created_at).toLocaleString()}</span>
                    </div>
                    <div class="text-zinc-300 leading-relaxed">${e.content}</div>
                </div>
            `).join('');
        }

        window.addRelay = async function() {
            const url = document.getElementById('relay-url').value.trim();
            const name = document.getElementById('relay-name').value.trim();
            if (!url) return alert('Enter a relay URL');
            await fetch('/api/relays', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url, name: name || null})
            });
            document.getElementById('relay-url').value = '';
            document.getElementById('relay-name').value = '';
            loadData();
        };

        window.addNpub = async function() {
            const npub = document.getElementById('npub-input').value.trim();
            const label = document.getElementById('label-input').value.trim();
            if (!npub) return alert('Enter an npub');
            await fetch('/api/npubs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({npub, label: label || null})
            });
            document.getElementById('npub-input').value = '';
            document.getElementById('label-input').value = '';
            loadData();
        };

        window.deleteRelay = async function(id) {
            if (confirm('Delete this relay?')) {
                await fetch(`/api/relays/${id}`, {method: 'DELETE'});
                loadData();
            }
        };

        window.deleteNpub = async function(id) {
            if (confirm('Delete this npub?')) {
                await fetch(`/api/npubs/${id}`, {method: 'DELETE'});
                loadData();
                if (selectedNpub) loadRecentEvents();
            }
        };

        window.triggerSync = async function() {
            const status = document.getElementById('status');
            status.innerHTML = '🔄 Syncing...';
            const res = await fetch('/api/sync', {method: 'POST'});
            const data = await res.json();
            status.innerHTML = data.success ? `🎉 ${data.message}` : `❌ ${data.message}`;
            loadData();
            if (selectedNpub) loadRecentEvents();
        };

        window.onload = loadData;
    </script>
</body>
</html>
