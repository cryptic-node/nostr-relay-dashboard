<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Relay Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #111111; font-family: system-ui; }
        .card { background: #1f1f1f; }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">Nostr Relay Dashboard</h1>
                <p class="text-zinc-400">Personal backup & aggregator • Version 1.0 • Dev Team: cryptic-node & SuperGrok • Powered by Rust</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-sm text-zinc-400">Nightly Sync (00:00)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="nightly-toggle" class="sr-only peer" checked onchange="toggleNightly(this)">
                        <div class="w-11 h-6 bg-zinc-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-purple-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                    </label>
                </div>
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="text-green-400 font-medium">Ready</span>
            </div>
        </div>

        <!-- three panels unchanged -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Upstream Relays, Monitored Npubs, Recent Events — keep your existing panel code exactly as it was -->
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <button onclick="triggerSync()" class="bg-purple-600 hover:bg-purple-700 text-white text-xl font-semibold px-12 py-5 rounded-3xl flex items-center gap-3">
                <i class="fas fa-sync"></i> Sync Now
            </button>
            <button onclick="doBackup()" class="bg-amber-600 hover:bg-amber-700 text-white text-xl font-semibold px-8 py-5 rounded-3xl flex items-center gap-3">
                <i class="fas fa-download"></i> Backup (NDJSON)
            </button>
            <label class="bg-emerald-600 hover:bg-emerald-700 text-white text-xl font-semibold px-8 py-5 rounded-3xl flex items-center gap-3 cursor-pointer">
                <i class="fas fa-upload"></i> Restore
                <input type="file" id="restore-file" accept=".ndjson" class="hidden" onchange="handleRestoreFile(this)">
            </label>
            <button onclick="downloadLogs()" class="bg-blue-600 hover:bg-blue-700 text-white text-xl font-semibold px-8 py-5 rounded-3xl flex items-center gap-3">
                <i class="fas fa-file-lines"></i> Download Logs
            </button>
            <button onclick="restartServer()" class="bg-red-600 hover:bg-red-700 text-white text-xl font-semibold px-8 py-5 rounded-3xl flex items-center gap-3">
                <i class="fas fa-power-off"></i> Restart Server
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-green-400 font-medium min-h-[28px]"></div>
    </div>

    <script>
        // all your existing functions (loadData, selectNpub, addRelay, etc.) stay exactly the same

        window.downloadLogs = async function() {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = 'Downloading logs...';
            const res = await fetch('/api/logs');
            const text = await res.text();
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nostr-logs.txt';
            a.click();
            URL.revokeObjectURL(url);
            statusEl.innerHTML = '✅ Logs downloaded!';
        };

        window.restartServer = async function() {
            if (!confirm('Restart the Nostr Relay Dashboard server?')) return;
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = 'Restarting server...';
            await fetch('/api/restart', { method: 'POST' });
            statusEl.innerHTML = '✅ Server restart requested — refresh after a few seconds';
        };

        // ... rest of your script (toggleNightly, loadSettings, etc.) unchanged
    </script>
</body>
</html>
