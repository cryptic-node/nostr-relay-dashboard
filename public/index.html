<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nostr Relay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #111111; font-family: system-ui; }
        .card { background: #1f1f1f; }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">My Nostr Relay</h1>
                <p class="text-zinc-400">Personal backup & aggregator • Powered by Rust</p>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                <span class="text-green-400 font-medium">Ready</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Relays -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Upstream Relays</h2>
                    <span class="bg-zinc-800 text-xs px-3 py-1 rounded-full" id="relay-count">0 relays</span>
                </div>
                <div id="relays-list" class="space-y-3"></div>
                <div class="mt-6 flex gap-2">
                    <input id="relay-url" placeholder="wss://..." class="flex-1 bg-zinc-900 rounded-xl px-4 py-3">
                    <input id="relay-name" placeholder="Name (optional)" class="w-48 bg-zinc-900 rounded-xl px-4 py-3">
                    <button onclick="addRelay()" class="bg-blue-500 px-6 rounded-xl">Add</button>
                </div>
            </div>

            <!-- Npubs -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Monitored Npubs</h2>
                    <span class="bg-zinc-800 text-xs px-3 py-1 rounded-full" id="npub-count">0 npubs</span>
                </div>
                <div id="npubs-list" class="space-y-3"></div>
                <div class="mt-6 flex gap-2">
                    <input id="npub-input" placeholder="npub1..." class="flex-1 bg-zinc-900 rounded-xl px-4 py-3">
                    <input id="label-input" placeholder="Label (optional)" class="w-48 bg-zinc-900 rounded-xl px-4 py-3">
                    <button onclick="addNpub()" class="bg-green-500 px-6 rounded-xl">Add</button>
                </div>
            </div>

            <!-- Recent Events -->
            <div class="card rounded-2xl p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">Recent Events</h2>
                    <span id="selected-npub" class="text-zinc-400 text-sm"></span>
                </div>
                <div id="events-list" class="space-y-3 min-h-[400px]"></div>
                <p id="no-events" class="text-zinc-500 text-center py-12">Click a npub to see recent events</p>
            </div>
        </div>

        <div class="mt-8 flex justify-center">
            <button onclick="triggerSync()" class="bg-purple-600 hover:bg-purple-700 px-12 py-5 rounded-3xl text-xl font-semibold flex items-center gap-3">
                <i class="fas fa-sync"></i> Sync Now
            </button>
        </div>
        <div id="status" class="mt-6 text-center text-green-400"></div>
    </div>

    <script>
        console.log("Dashboard JS loaded");

        let selectedNpub = null;

        async function loadData() {
            console.log("Loading data...");
            try {
                const [rRes, nRes] = await Promise.all([
                    fetch('/api/relays'), 
                    fetch('/api/npubs')
                ]);
                const relays = await rRes.json();
                const npubs = await nRes.json();

                console.log("Relays received:", relays.length);
                console.log("Npubs received:", npubs.length);

                // Render relays
                document.getElementById('relays-list').innerHTML = relays.map(r => `
                    <div class="bg-zinc-900 rounded-xl p-4">
                        <div class="font-mono text-sm text-blue-400">${r.url}</div>
                        <div class="text-zinc-400 text-xs">${r.name || ''}</div>
                    </div>
                `).join('');

                // Render npubs
                document.getElementById('npubs-list').innerHTML = npubs.map(n => `
                    <div onclick="selectNpub('${n.npub}', '${n.label || ''}')" class="bg-zinc-900 hover:bg-zinc-800 p-4 rounded-xl cursor-pointer">
                        <div class="font-mono text-sm break-all">${n.npub}</div>
                    </div>
                `).join('');

                document.getElementById('relay-count').textContent = `${relays.length} relays`;
                document.getElementById('npub-count').textContent = `${npubs.length} npubs`;
            } catch (e) {
                console.error("Load data failed:", e);
            }
        }

        window.selectNpub = async function(npub, label) {
            selectedNpub = npub;
            document.getElementById('selected-npub').textContent = label || npub.substring(0,12) + '...';
            console.log("Selected npub:", npub);
            // TODO: load events
            loadData();
        };

        window.addRelay = async function() {
            const url = document.getElementById('relay-url').value.trim();
            if (!url) return;
            await fetch('/api/relays', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({url})});
            document.getElementById('relay-url').value = '';
            loadData();
        };

        window.addNpub = async function() {
            const npub = document.getElementById('npub-input').value.trim();
            if (!npub) return;
            await fetch('/api/npubs', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({npub})});
            document.getElementById('npub-input').value = '';
            loadData();
        };

        window.triggerSync = async function() {
            const status = document.getElementById('status');
            status.textContent = 'Syncing...';
            await fetch('/api/sync', {method: 'POST'});
            status.textContent = 'Sync finished!';
            loadData();
        };

        window.onload = () => {
            console.log("Page loaded - starting data fetch");
            loadData();
        };
    </script>
</body>
</html>
