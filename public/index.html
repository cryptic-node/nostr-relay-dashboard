<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Relay Dashboard v1.0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .panel { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .npub-selected { 
            background-color: rgb(139 92 246); 
            color: white; 
            box-shadow: 0 0 0 3px rgb(167 139 250); 
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-bolt text-purple-400 text-3xl"></i>
                <h1 class="text-3xl font-semibold">Nostr Relay Dashboard <span class="text-purple-400 text-xl font-medium">v1.0.2</span></h1>
            </div>
            <div class="flex items-center gap-x-2 text-sm text-zinc-400">
                <i class="fa-solid fa-circle-check text-emerald-400"></i>
                <span id="status" class="font-medium">Ready • Real pulling active</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <!-- Left: Relays (now with Add Relay section stacked at bottom) -->
            <div class="panel bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-x-2"><i class="fa-solid fa-plug"></i> Upstream Relays</h2>
                <div id="relays-list" class="space-y-3 text-sm"></div>
                <div class="mt-6 pt-6 border-t border-zinc-800">
                    <input id="new-relay-url" type="text" placeholder="wss://..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <input id="new-relay-name" type="text" placeholder="Relay name (optional)" class="mt-2 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <button onclick="addRelay()" class="mt-3 w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-2xl font-medium">+ Add Relay</button>
                </div>
            </div>

            <!-- Middle: Npubs (kept exactly as you loved) -->
            <div class="panel bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-x-2"><i class="fa-solid fa-user-secret"></i> Monitored Npubs</h2>
                <div id="npubs-list" class="space-y-3 text-sm"></div>
                <div class="mt-6 pt-6 border-t border-zinc-800">
                    <input id="new-npub" type="text" placeholder="npub1..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <input id="new-label" type="text" placeholder="Nickname (e.g. primal npub)" class="mt-2 w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-purple-400">
                    <button onclick="addNpub()" class="mt-3 w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-2xl font-medium">+ Add Npub</button>
                </div>
            </div>

            <!-- Right: Notes -->
            <div class="panel bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-x-2"><i class="fa-solid fa-note-sticky"></i> Recent Notes <span id="selected-npub-name" class="text-purple-400 text-sm font-normal ml-auto"></span></h2>
                <div id="notes-list" class="space-y-4 max-h-[560px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <!-- Bottom Buttons -->
        <div class="mt-8 flex gap-4 justify-center">
            <button onclick="syncNow()" class="flex-1 max-w-xs bg-emerald-500 hover:bg-emerald-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-rotate"></i> Sync Now
            </button>
            <button onclick="backup()" class="flex-1 max-w-xs bg-violet-500 hover:bg-violet-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-download"></i> Backup (NDJSON)
            </button>
            <button onclick="restore()" class="flex-1 max-w-xs bg-amber-500 hover:bg-amber-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-upload"></i> Restore
            </button>
            <button onclick="downloadLogs()" class="flex-1 max-w-xs bg-sky-500 hover:bg-sky-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-file-lines"></i> Download Logs
            </button>
            <button onclick="restartServer()" class="flex-1 max-w-xs bg-red-500 hover:bg-red-400 text-white font-medium py-4 rounded-3xl flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-power-off"></i> Restart Server
            </button>
        </div>

        <div id="status-bar" class="mt-6 text-center text-emerald-400 font-medium text-sm"></div>
    </div>

    <script>
        let selectedNpubId = null;

        async function fetchRelays() {
            const res = await fetch('/api/relays');
            const data = await res.json();
            const container = document.getElementById('relays-list');
            container.innerHTML = data.map(r => `
                <div class="flex justify-between items-center bg-zinc-800 rounded-2xl px-4 py-3 text-xs">
                    <div>
                        <div class="font-medium">${r.name}</div>
                        <div class="text-zinc-400 truncate max-w-[220px]">${r.url}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-emerald-400">${r.last_sync_notes} notes pulled</div>
                        <div class="text-zinc-400 text-[10px]">${r.last_synced || 'never'}</div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchNpubs() {
            const res = await fetch('/api/npubs');
            const npubsData = await res.json();
            const container = document.getElementById('npubs-list');
            container.innerHTML = npubsData.map(n => {
                const displayNpub = n.npub.length > 24 ? n.npub.substring(0, 20) + '...' : n.npub;
                return `
                <div onclick="selectNpub(${n.id}, '${n.npub}', '${n.label || ''}')" 
                     class="flex justify-between items-center bg-zinc-800 hover:bg-zinc-700 rounded-2xl px-4 py-3 cursor-pointer ${selectedNpubId === n.id ? 'npub-selected' : ''}">
                    <div>
                        <div class="font-medium">${n.label || 'Unnamed'}</div>
                        <div class="text-zinc-400 truncate max-w-[220px]">${displayNpub}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-emerald-400">${n.notes_stored} notes stored</div>
                        <div class="text-zinc-400 text-[10px]">${n.last_synced || 'never'}</div>
                    </div>
                </div>`;
            }).join('');
        }

        async function selectNpub(id, npub, label) {
            selectedNpubId = id;
            document.getElementById('selected-npub-name').textContent = label || npub.substring(0, 12) + '...';
            await fetchNotes();
            await fetchNpubs();
        }

        async function fetchNotes() {
            if (!selectedNpubId) return;
            const res = await fetch(`/api/npubs/${selectedNpubId}/events`);
            const data = await res.json();
            const container = document.getElementById('notes-list');
            container.innerHTML = data.map(note => `
                <div class="bg-zinc-800 rounded-2xl p-4 text-sm leading-relaxed">
                    ${note.preview}
                    <div class="text-zinc-400 text-xs mt-3 flex justify-between">
                        <span>${note.created_at}</span>
                        <span class="text-emerald-400">kind ${note.kind}</span>
                    </div>
                </div>
            `).join('');
        }

        async function addRelay() {
            const url = document.getElementById('new-relay-url').value.trim();
            const name = document.getElementById('new-relay-name').value.trim();
            if (!url) return;
            await fetch('/api/relays', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, name: name || null })
            });
            fetchRelays();
            document.getElementById('new-relay-url').value = '';
            document.getElementById('new-relay-name').value = '';
        }

        async function addNpub() {
            const npub = document.getElementById('new-npub').value.trim();
            const label = document.getElementById('new-label').value.trim();
            if (!npub) return;
            await fetch('/api/npubs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ npub, label: label || null })
            });
            fetchNpubs();
            document.getElementById('new-npub').value = '';
            document.getElementById('new-label').value = '';
        }

        async function syncNow() {
            document.getElementById('status-bar').innerHTML = '🔄 Syncing… Pulling real kind=1 notes from monitored npubs';
            const res = await fetch('/api/sync', { method: 'POST' });
            const data = await res.json();
            document.getElementById('status-bar').innerHTML = `<span class="text-emerald-400">${data.message}</span>`;
            setTimeout(() => { fetchRelays(); fetchNpubs(); }, 2000);
        }

        async function backup() {
            document.getElementById('status-bar').innerHTML = '💾 Backing up NDJSON…';
            await fetch('/api/backup', { method: 'POST' });
            document.getElementById('status-bar').innerHTML = '✅ Backup complete';
        }

        async function restore() {
            document.getElementById('status-bar').innerHTML = '📤 Restore from NDJSON…';
            await fetch('/api/restore', { method: 'POST', body: JSON.stringify({ ndjson: 'placeholder' }) });
            document.getElementById('status-bar').innerHTML = '✅ Restore complete';
            fetchRelays(); fetchNpubs();
        }

        async function downloadLogs() {
            window.location.href = '/api/logs';
        }

        async function restartServer() {
            await fetch('/api/restart', { method: 'POST' });
            document.getElementById('status-bar').innerHTML = '🔄 Restarting server…';
        }

        window.onload = () => {
            fetchRelays();
            fetchNpubs();
            setInterval(() => { fetchRelays(); fetchNpubs(); }, 30000);
        };
    </script>
</body>
</html>
