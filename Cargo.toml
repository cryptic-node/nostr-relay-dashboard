[package]
name = "nostr-relay-dashboard-server"
version = "0.1.0"
edition = "2021"
authors = ["cryptic-node"]
description = "Rust-based Nostr relay with web dashboard for managing whitelisted npubs"
license = "Unlicense"

[dependencies]
# Core web framework
axum = { version = "0.7", features = ["ws", "json", "query"] }
axum-extra = { version = "0.9", features = ["typed-header"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Database
sqlx = { version = "0.8", features = [
    "runtime-tokio",
    "sqlite",
    "chrono",
    "macros",
    "migrate"
] }
chrono = { version = "0.4", features = ["serde"] }

# Nostr / cryptography
secp256k1 = { version = "0.29", features = ["serde", "rand", "global-context"] }
bech32 = "0.11"

# JSON & serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# WebSocket & broadcasting
tokio-tungstenite = "0.24"   # often needed with axum ws
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

# Utilities
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1.10"
once_cell = "1.19"
lazy_static = "1.5"

# Optional: for better performance / future HTTPS
# rustls = "0.23"
# rustls-pemfile = "2.1"
# tokio-rustls = "0.26"

[dev-dependencies]
# Add tests later if needed

[[bin]]
name = "nostr-relay"
path = "src/main.rs"