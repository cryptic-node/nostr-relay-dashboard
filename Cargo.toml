[package]
name = "nostr-relay-dashboard-server"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core dependencies that were missing or unresolved
tokio = { version = "1", features = ["full"] }
futures = "0.3"
futures-util = "0.3"
axum = { version = "0.7", features = ["ws"] }          # or tungstenite if it uses that
tower = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
bech32 = "0.11"          # newer version (API changed)
tracing = "0.1"
tracing-subscriber = "0.3"

# If it uses tungstenite directly for WebSocket:
tungstenite = { version = "0.23", features = ["__rustls-tls"] }  # or without tls if not needed
